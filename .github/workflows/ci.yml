name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: agent_control
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, mysql
        coverage: xdebug
    - name: Install dependencies
      run: ./test/install.sh
    - name: Run tests
      run: composer test
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Playwright
      run: |
        python -m pip install playwright
        playwright install --with-deps chromium
    - name: Start PHP Server
      run: php -S localhost:8080 -t public > php_server.log 2>&1 &
    - name: Run Frontend Verification
      env:
        DB_HOST: 127.0.0.1
        DB_NAME: agent_control
        DB_USER: root
        DB_PASS: password
      run: python test/verify_dashboard.py
    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: build/screenshots/

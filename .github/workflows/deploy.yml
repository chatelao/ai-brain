name: Manual SSH Deploy

on:
  workflow_dispatch:
    inputs:
      include_vendor:
        description: 'Include vendor directory'
        required: true
        type: boolean
        default: false
      lts_target:
        description: 'LTS target'
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      include_vendor:
        description: 'Include vendor directory'
        required: true
        type: boolean
        default: false
      lts_target:
        description: 'LTS target'
        required: true
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to Webserver
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner || github.event_name == 'workflow_call'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        if: ${{ inputs.include_vendor }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Install dependencies
        if: ${{ inputs.include_vendor }}
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm install
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web

      - name: Prepare web for deployment
        run: |
          mkdir -p src/frontend/web
          cp -r web/out/* src/frontend/web/

      - name: Deploy via SSH
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          remote_path: ${{ inputs.lts_target && secrets.SFTP_PATH_LTS || secrets.SFTP_PATH }}
          port: 22
          local_path: './'
          sftp_only: false
          rsyncArgs: >-
            ${{ inputs.include_vendor == false && '--exclude=/vendor/' || '' }}
            --exclude=/.git\*
            --exclude=/.github/
            --exclude=/test/
            --exclude=/docs/
            --exclude=/specification/
            --exclude=/TOP_CONCEPT.md
            --exclude=/TOP_DESIGN.md
            --exclude=/TOP_ROADMAP.md
            --exclude=/GEMINI.md
            --exclude=/HOWTO.md
            --exclude=/INSTALL.md
            --exclude=/CONCEPT_UPGRADES.md
            --exclude=/openapi.yaml
            --exclude=/schema.puml
            --exclude=/\*.sqlite
            --exclude=/.readthedocs.yaml
            --exclude=/phpunit.xml
            --exclude=/README.md
            --exclude=/web/

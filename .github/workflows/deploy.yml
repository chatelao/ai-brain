name: Manual SSH Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Webserver
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Deploy via SSH
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          remote_path: ${{ secrets.SSH_PATH }}
          port: 22
          local_path: './'
          sftp_only: false
          rsyncArgs: >-
            --exclude=.git\*
            --exclude=.github/
            --exclude=test/
            --exclude=docs/
            --exclude=specification/
            --exclude=scripts/
            --exclude=Vagrantfile
            --exclude=CONCEPT.md
            --exclude=DESIGN.md
            --exclude=GEMINI.md
            --exclude=HOWTO.md
            --exclude=INSTALL.md
            --exclude=ROADMAP.md
            --exclude=CONCEPT_UPGRADES.md
            --exclude=openapi.yaml
            --exclude=schema.puml
            --exclude=\*.sqlite
            --exclude=.readthedocs.yaml
            --exclude=phpunit.xml
            --exclude=README.md

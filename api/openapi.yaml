openapi: 3.0.0
info:
  title: Agent Control API
  description: Interface between the frontend and backend of the Agent Control application.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /login.php:
    get:
      summary: Initiate Google SSO login
      description: Redirects the user to Google for authentication.
      responses:
        '302':
          description: Redirect to Google OAuth URL

  /callback.php:
    get:
      summary: Google SSO callback
      description: Handles the response from Google and logs the user in.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          examples:
            GoogleAuth:
              value: 4/0AfgeXvv-some-token-123
      responses:
        '302':
          description: Redirect to index.php after successful login
          headers:
            Location:
              schema:
                type: string
              examples:
                GoogleAuth:
                  value: index.php
        '200':
          description: Error message on failure

  /logout.php:
    get:
      summary: Log out
      description: Destroys the user session.
      responses:
        '302':
          description: Redirect to login.php

  /github-login.php:
    get:
      summary: Initiate GitHub OAuth
      description: Redirects the user to GitHub for account linking.
      responses:
        '302':
          description: Redirect to GitHub OAuth URL

  /github-callback.php:
    get:
      summary: GitHub OAuth callback
      description: Handles the response from GitHub and links the account.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          examples:
            GitHubAuth:
              value: github_code_123
      responses:
        '302':
          description: Redirect to index.php with success or error status
          headers:
            Location:
              schema:
                type: string
              examples:
                GitHubAuth:
                  value: index.php?github=success

  /index.php:
    get:
      summary: Dashboard
      description: Displays user projects and linked GitHub accounts.
      parameters:
        - name: success
          in: query
          schema:
            type: string
          examples:
            ProjectCreated:
              value: project_created
        - name: github
          in: query
          schema:
            type: string
          examples:
            GitHubLinked:
              value: success
        - name: delete_project
          in: query
          schema:
            type: integer
          examples:
            DeleteProject:
              value: 1
        - name: csrf_token
          in: query
          schema:
            type: string
          examples:
            DeleteProject:
              value: token_abc_123
      responses:
        '200':
          description: Dashboard HTML page
    post:
      summary: Link new repository
      description: Creates a new project by linking a GitHub repository.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                github_repo:
                  type: string
                github_account_id:
                  type: integer
                csrf_token:
                  type: string
            examples:
              CreateProject:
                value:
                  github_repo: "google/jules"
                  github_account_id: 1
                  csrf_token: "token_abc_123"
      responses:
        '302':
          description: Redirect to index.php with success status
          headers:
            Location:
              schema:
                type: string
              examples:
                CreateProject:
                  value: index.php?success=project_created

  /project.php:
    get:
      summary: Project details
      description: Displays tasks and logs for a specific project.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          examples:
            ViewProject:
              value: 1
      responses:
        '200':
          description: Project details HTML page
          content:
            text/html:
              examples:
                ViewProject:
                  value: "<html>...google/jules...</html>"
    post:
      summary: Trigger agent
      description: Manually triggers the Jules agent for a specific task.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                trigger_agent:
                  type: string
                task_id:
                  type: integer
                csrf_token:
                  type: string
            examples:
              TriggerAgent:
                value:
                  trigger_agent: "Run Agent"
                  task_id: 42
                  csrf_token: "token_abc_123"
      responses:
        '200':
          description: Project details HTML page updated with agent response
          content:
            text/html:
              examples:
                TriggerAgent:
                  value: "<html>...Agent response...</html>"

  /webhook.php:
    post:
      summary: GitHub Webhook
      description: Receives 'issues' events from GitHub.
      parameters:
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
          examples:
            IssueEvent:
              value: sha256=hash_here
        - name: X-GitHub-Event
          in: header
          required: true
          schema:
            type: string
            enum: [issues]
          examples:
            IssueEvent:
              value: issues
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitHubIssueEvent'
            examples:
              IssueEvent:
                value:
                  action: "opened"
                  issue:
                    number: 101
                    title: "Bug: App crashes"
                    body: "Steps to reproduce..."
                  repository:
                    full_name: "google/jules"
      responses:
        '200':
          description: OK
          content:
            text/plain:
              examples:
                IssueEvent:
                  value: "OK"
        '400':
          description: Invalid request
        '401':
          description: Invalid signature
        '404':
          description: Project not found
        '500':
          description: Failed to process event

  /telegram-webhook.php:
    post:
      summary: Telegram Webhook
      description: Receives updates from the Telegram Bot API.
      parameters:
        - name: X-Telegram-Bot-Api-Secret-Token
          in: header
          required: true
          schema:
            type: string
          examples:
            TelegramUpdate:
              value: secret_token_123
      requestBody:
        content:
          application/json:
            schema:
              type: object
            examples:
              TelegramStart:
                value:
                  update_id: 12345
                  message:
                    message_id: 1
                    from:
                      id: 98765
                      first_name: "John"
                    chat:
                      id: 98765
                      type: "private"
                    date: 1610000000
                    text: "/start token_abc"
      responses:
        '200':
          description: OK
          content:
            text/plain:
              examples:
                TelegramUpdate:
                  value: "OK"
        '401':
          description: Unauthorized

  /admin/index.php:
    get:
      summary: Admin dashboard
      description: User management for administrators.
      responses:
        '200':
          description: Admin dashboard HTML page
          content:
            text/html:
              examples:
                AdminView:
                  value: "<html>...User Management...</html>"
        '302':
          description: Redirect to login if not logged in
        '403':
          description: Access denied if not admin

  /api/token.php:
    get:
      summary: Obtain JWT token
      description: Issues a JWT access token and a refresh token for the currently session-authenticated user.
      responses:
        '200':
          description: A pair of JWT access token and refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
        '401':
          description: Unauthorized

  /api/refresh.php:
    get:
      summary: Refresh JWT token
      description: Exchanges a valid refresh token for a new access token and refresh token.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A new pair of JWT access token and refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
        '400':
          description: Missing refresh token
        '401':
          description: Invalid or expired refresh token

  /api/projects.php:
    get:
      summary: List user projects (JSON)
      description: Returns a list of projects associated with the authenticated user.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A JSON list of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          description: Unauthorized

  /api/tasks.php:
    get:
      summary: List project tasks (JSON)
      description: Returns a list of tasks for a specific project.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: Project ID
      responses:
        '200':
          description: A JSON list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '404':
          description: Project not found

  /api/task.php:
    get:
      summary: Get task details (JSON)
      description: Returns details for a specific task.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: Task ID
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '404':
          description: Task not found
    post:
      summary: Perform task action
      description: Triggers actions like agent execution or PR merging for a task.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: Task ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [trigger_agent, merge_close]
              required:
                - action
      responses:
        '200':
          description: Action performed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  agent_response:
                    type: string
        '400':
          description: Invalid action or missing parameters
        '401':
          description: Unauthorized
        '403':
          description: Access denied
        '404':
          description: Task not found
        '500':
          description: Action failed

  /api/task-logs.php:
    get:
      summary: Get task logs (JSON)
      description: Returns logs for a specific task.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: Task ID
      responses:
        '200':
          description: A JSON list of task logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskLog'
        '401':
          description: Unauthorized
        '404':
          description: Task not found

  /api/webhook-logs.php:
    get:
      summary: List webhook logs (JSON)
      description: Returns a list of webhook logs for the authenticated user or all logs if admin.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A JSON list of webhook logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookLog'
        '401':
          description: Unauthorized

  /api/performance-logs.php:
    get:
      summary: List performance logs (JSON)
      description: Returns a list of performance and API logs for the authenticated user or all logs if admin.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: A JSON list of performance logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PerformanceLog'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        google_id:
          type: string
          example: "123456789"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          example: "john@example.com"
        avatar:
          type: string
          nullable: true
          example: "https://avatar.url"
        role:
          type: string
          enum: [user, admin]
          example: "user"
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T10:00:00Z"

    Project:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        github_account_id:
          type: integer
          example: 1
        github_repo:
          type: string
          example: "google/jules"
        webhook_secret:
          type: string
          example: "secret_123"
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T10:05:00Z"
        github_username:
          type: string
          example: "johndoe_git"

    Task:
      type: object
      properties:
        id:
          type: integer
          example: 42
        project_id:
          type: integer
          example: 1
        issue_number:
          type: integer
          example: 101
        title:
          type: string
          example: "Bug: App crashes"
        body:
          type: string
          example: "Steps to reproduce..."
        status:
          type: string
          enum: [created, analyzing, planning, executing, verifying, checking, ready, finished, implemented, failed_jules, failed_pr]
          example: "created"
        agent_response:
          type: string
          nullable: true
          example: "The bug is caused by..."
        pr_url:
          type: string
          nullable: true
          example: "https://github.com/google/jules/pull/123"
        jules_url:
          type: string
          nullable: true
          example: "https://jules.google.com/task/abc-123"
        jules_status:
          type: string
          nullable: true
          example: "coding"
        github_state:
          type: string
          example: "open"
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T10:10:00Z"
        last_synced_at:
          type: string
          format: date-time
          nullable: true
          example: "2023-10-27T10:15:00Z"

    TaskLog:
      type: object
      properties:
        id:
          type: integer
          example: 500
        task_id:
          type: integer
          example: 42
        message:
          type: string
          example: "Agent triggered by user John Doe"
        level:
          type: string
          enum: [info, error]
          example: "info"
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T10:11:00Z"

    WebhookLog:
      type: object
      properties:
        id:
          type: integer
          example: 1000
        user_id:
          type: integer
          example: 1
        user_email:
          type: string
          nullable: true
          example: "john@example.com"
        endpoint:
          type: string
          example: "webhook.php"
        payload:
          type: string
          nullable: true
        headers:
          type: string
          nullable: true
        status_code:
          type: integer
          example: 200
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T10:20:00Z"

    PerformanceLog:
      type: object
      properties:
        id:
          type: integer
          example: 2000
        user_id:
          type: integer
          nullable: true
          example: 1
        user_email:
          type: string
          nullable: true
          example: "john@example.com"
        type:
          type: string
          example: "api"
        target:
          type: string
          example: "GET /api/projects"
        duration:
          type: number
          format: float
          example: 0.123
        context:
          type: object
          nullable: true
        status_code:
          type: integer
          nullable: true
          example: 200
        error_message:
          type: string
          nullable: true
          example: "Not Found"
        created_at:
          type: string
          format: date-time
          example: "2023-10-27T10:30:00Z"

    GitHubIssueEvent:
      type: object
      properties:
        action:
          type: string
          example: "opened"
        issue:
          type: object
          properties:
            number:
              type: integer
              example: 101
            title:
              type: string
              example: "Bug: App crashes"
            body:
              type: string
              example: "Steps to reproduce..."
        repository:
          type: object
          properties:
            full_name:
              type: string
              example: "google/jules"

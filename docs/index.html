<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules Agent Control - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal" x-data="dashboard()">
    <nav class="bg-white border-b border-gray-200 fixed z-30 w-full">
        <div class="px-3 py-3 lg:px-5 lg:pl-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center justify-start">
                    <span class="text-xl font-bold flex items-center lg:ml-2.5">
                        <span class="self-center whitespace-nowrap">Jules Agent Control</span>
                    </span>
                </div>
                <div class="flex items-center">
                    <div class="flex items-center ml-3">
                        <div>
                            <button type="button" class="bg-gray-800 flex text-sm rounded-full focus:ring-4 focus:ring-gray-300" id="user-menu-button-2" aria-expanded="false" data-dropdown-toggle="dropdown-2">
                                <span class="sr-only">Open user menu</span>
                                <img class="w-8 h-8 rounded-full" src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y" alt="user photo">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex overflow-hidden bg-gray-50 pt-16">
        <div id="main-content" class="h-full w-full bg-gray-50 relative overflow-y-auto">
            <main>
                <div class="pt-6 px-4">
                    <div class="w-full grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                        <template x-for="project in projects" :key="project.id">
                            <div class="bg-white shadow rounded-lg p-4 sm:p-6 xl:p-8 ">
                                <div class="flex items-center justify-between mb-4">
                                    <h3 class="text-xl font-bold text-gray-900" x-text="project.name"></h3>
                                    <a :href="'project.html?id=' + project.id" class="text-sm font-medium text-cyan-600 hover:bg-gray-100 rounded-lg p-2">View details</a>
                                </div>
                                <div class="flex items-center">
                                    <div class="flex-shrink-0">
                                        <span class="text-2xl sm:text-3xl leading-none font-bold text-gray-900" x-text="project.issues"></span>
                                        <h3 class="text-base font-normal text-gray-500">Issues</h3>
                                    </div>
                                    <div class="ml-5 w-0 flex-1">
                                        <div :class="{
                                            'bg-green-100 text-green-800': project.status === 'Success',
                                            'bg-yellow-100 text-yellow-800': project.status === 'Running',
                                            'bg-red-100 text-red-800': project.status === 'Failed',
                                            'bg-gray-100 text-gray-800': project.status === 'Idle'
                                        }" class="rounded-full px-3 py-1 text-xs font-semibold inline-flex items-center">
                                            <span class="w-2 h-2 rounded-full mr-1" :class="{
                                                'bg-green-500': project.status === 'Success',
                                                'bg-yellow-500': project.status === 'Running',
                                                'bg-red-500': project.status === 'Failed',
                                                'bg-gray-500': project.status === 'Idle'
                                            }"></span>
                                            <span x-text="project.status"></span>
                                        </div>
                                        <div class="text-xs text-gray-400 mt-1" x-text="'Last updated: ' + project.lastUpdate"></div>
                                    </div>
                                </div>
                                <div class="mt-4">
                                    <p class="text-sm text-gray-600 truncate" x-text="project.lastMessage"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function dashboard() {
            return {
                projects: [
                    { id: 1, name: 'Project Alpha', issues: 12, status: 'Success', lastUpdate: '2 mins ago', lastMessage: 'Fixed bug in authentication module' },
                    { id: 2, name: 'Project Beta', issues: 5, status: 'Running', lastUpdate: 'Just now', lastMessage: 'Analyzing repository structure...' },
                    { id: 3, name: 'Project Gamma', issues: 28, status: 'Failed', lastUpdate: '1 hour ago', lastMessage: 'Error: API quota exceeded' },
                    { id: 4, name: 'Project Delta', issues: 0, status: 'Idle', lastUpdate: '3 days ago', lastMessage: 'No active tasks' },
                    { id: 5, name: 'Project Epsilon', issues: 7, status: 'Success', lastUpdate: '5 hours ago', lastMessage: 'Updated documentation' },
                    { id: 6, name: 'Project Zeta', issues: 15, status: 'Running', lastUpdate: '10 mins ago', lastMessage: 'Refactoring data models...' },
                ]
            }
        }
    </script>
</body>
</html>

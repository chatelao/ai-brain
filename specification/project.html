<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules Agent Control - Project Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal" x-data="projectDetail()">
    <nav class="bg-white border-b border-gray-200 fixed z-30 w-full">
        <div class="px-3 py-3 lg:px-5 lg:pl-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center justify-start">
                    <a href="index.html" class="text-xl font-bold flex items-center lg:ml-2.5">
                        <span class="self-center whitespace-nowrap">Jules Agent Control</span>
                    </a>
                </div>
                <div class="flex items-center">
                    <div class="text-sm font-medium text-gray-500 mr-4" x-text="projectName"></div>
                    <div class="flex items-center ml-3">
                        <button type="button" class="bg-gray-800 flex text-sm rounded-full focus:ring-4 focus:ring-gray-300">
                            <img class="w-8 h-8 rounded-full" src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y" alt="user photo">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex overflow-hidden bg-gray-50 pt-16">
        <div id="main-content" class="h-full w-full bg-gray-50 relative overflow-y-auto">
            <main>
                <div class="pt-6 px-4">
                    <div class="mb-4">
                        <nav class="flex mb-5" aria-label="Breadcrumb">
                            <ol class="inline-flex items-center space-x-1 md:space-x-2">
                                <li class="inline-flex items-center">
                                    <a href="index.html" class="text-gray-700 hover:text-gray-900 inline-flex items-center">
                                        <svg class="w-5 h-5 mr-2.5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                                        Dashboard
                                    </a>
                                </li>
                                <li>
                                    <div class="flex items-center">
                                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                                        <span class="text-gray-400 ml-1 md:ml-2 font-medium" x-text="projectName"></span>
                                    </div>
                                </li>
                            </ol>
                        </nav>
                        <h1 class="text-xl sm:text-2xl font-semibold text-gray-900" x-text="projectName + ' Overview'"></h1>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 mb-4">
                        <!-- Action Buttons -->
                        <div class="bg-white shadow rounded-lg p-4 sm:p-6 xl:p-8 col-span-1">
                            <h3 class="text-lg font-bold text-gray-900 mb-4">Standard Actions</h3>
                            <div class="grid grid-cols-2 gap-2">
                                <template x-for="action in actions" :key="action.name">
                                    <button @click="triggerAction(action.name)" class="text-white bg-cyan-600 hover:bg-cyan-700 font-medium rounded-lg text-sm px-4 py-2.5 text-center inline-flex items-center justify-center">
                                        <span x-text="action.name"></span>
                                    </button>
                                </template>
                            </div>
                            <div class="mt-4 p-3 bg-gray-100 rounded text-xs font-mono" x-show="lastAction" x-cloak>
                                Last action: <span x-text="lastAction"></span> triggered.
                            </div>
                        </div>

                        <!-- Issues List -->
                        <div class="bg-white shadow rounded-lg p-4 sm:p-6 xl:p-8 col-span-1 xl:col-span-2">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-lg font-bold text-gray-900">Current & Past Issues</h3>
                            </div>
                            <div class="flex flex-col mt-8">
                                <div class="overflow-x-auto rounded-lg">
                                    <div class="align-middle inline-block min-w-full">
                                        <div class="shadow overflow-hidden sm:rounded-lg">
                                            <table class="min-w-full divide-y divide-gray-200">
                                                <thead class="bg-gray-50">
                                                    <tr>
                                                        <th scope="col" class="p-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Issue</th>
                                                        <th scope="col" class="p-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                                        <th scope="col" class="p-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Agent State</th>
                                                        <th scope="col" class="p-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="bg-white">
                                                    <template x-for="issue in issues" :key="issue.id">
                                                        <tr>
                                                            <td class="p-4 whitespace-nowrap text-sm font-normal text-gray-900">
                                                                <div class="font-semibold" x-text="'#' + issue.id + ' ' + issue.title"></div>
                                                                <div class="text-xs text-gray-500" x-text="issue.date"></div>
                                                            </td>
                                                            <td class="p-4 whitespace-nowrap text-sm font-normal text-gray-500">
                                                                <span :class="{
                                                                    'bg-green-100 text-green-800': issue.status === 'Closed',
                                                                    'bg-blue-100 text-blue-800': issue.status === 'Open'
                                                                }" class="px-2 py-1 rounded-md text-xs" x-text="issue.status"></span>
                                                            </td>
                                                            <td class="p-4 whitespace-nowrap text-sm font-normal text-gray-500">
                                                                <span x-text="issue.agentState"></span>
                                                            </td>
                                                            <td class="p-4 whitespace-nowrap text-sm font-semibold text-gray-900">
                                                                <button class="text-cyan-600 hover:underline">View</button>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function projectDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id') || 1;

            return {
                projectName: 'Project Alpha', // Hardcoded for mockup
                lastAction: '',
                actions: [
                    { name: 'Run Agent' },
                    { name: 'Stop Agent' },
                    { name: 'Sync Issues' },
                    { name: 'Fetch Logs' },
                    { name: 'Dry Run' },
                    { name: 'Update Base' },
                    { name: 'Check Quota' },
                    { name: 'Assign Dev' },
                    { name: 'Review PR' },
                    { name: 'Merge' }
                ],
                issues: [
                    { id: 101, title: 'Fix login redirection', status: 'Open', agentState: 'Working', date: '2023-10-24' },
                    { id: 98, title: 'Update README layout', status: 'Closed', agentState: 'Success', date: '2023-10-22' },
                    { id: 95, title: 'Memory leak in session', status: 'Closed', agentState: 'Success', date: '2023-10-20' },
                    { id: 92, title: 'Add unit tests for API', status: 'Open', agentState: 'Idle', date: '2023-10-18' },
                    { id: 88, title: 'CSS alignment on mobile', status: 'Closed', agentState: 'Failed', date: '2023-10-15' },
                ],
                triggerAction(name) {
                    this.lastAction = name;
                    alert('Triggered: ' + name);
                }
            }
        }
    </script>
</body>
</html>
